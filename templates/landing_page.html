<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{brand_name}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
    <nav class="border-b border-gray-800">
        <div class="max-w-screen-xl mx-auto px-6 py-4">
            <div class="font-bold text-xl">{{brand_name}}</div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-16">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-bold mb-4">{{headline}}</h1>
            <p class="text-xl text-gray-400">{{subheadline}}</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-16">
            <div class="border border-gray-800 rounded-lg p-6">
                <p class="text-gray-300">{{feature_1}}</p>
            </div>
            <div class="border border-gray-800 rounded-lg p-6">
                <p class="text-gray-300">{{feature_2}}</p>
            </div>
            <div class="border border-gray-800 rounded-lg p-6">
                <p class="text-gray-300">{{feature_3}}</p>
            </div>
        </div>

        <div class="text-center">
            <a href="{{cta_url}}" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-8 py-3 rounded-lg transition-colors">
                {{cta_label}}
            </a>
            <p class="text-sm text-gray-500 mt-4">{{social_proof}}</p>
        </div>
    </main>
</body>
</html>
